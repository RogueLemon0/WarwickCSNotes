<!DOCTYPE html>
<html lang="en">
<head>
    <title>{{ note_title }} - {{ module.code }} - Warwick CS Notes</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='themes.css') }}" rel="stylesheet">
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body class="light-theme">

    {% include "_navbar.html" %}

    <div class="container py-5">

        <div class="d-flex align-items-center gap-3 mb-4">
            <a href="/module/{{ module.code }}" class="btn btn-outline-secondary">&larr; Back to {{ module.code }}</a>
            <span class="text-muted">{{ module.name }}</span>
        </div>

        <article class="prose">
            {{ content | safe }}
        </article>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function setTheme(theme) {
            document.querySelectorAll('.light-theme, .dark-theme, .ifykyk-theme, .cs141-theme').forEach(el => {
                el.classList.remove('light-theme', 'dark-theme', 'ifykyk-theme', 'cs141-theme');
                el.classList.add(theme + '-theme');
            });
            localStorage.setItem('theme', theme);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('theme');
            if (saved && saved !== 'light') setTheme(saved);
        });
    </script>
</body>
</html>
